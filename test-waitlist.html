<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Waitlist Submission</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
      background: #1a1a1a;
      color: #fff;
    }
    input {
      padding: 10px;
      width: 300px;
      margin-right: 10px;
      background: #2a2a2a;
      border: 1px solid #444;
      color: #fff;
      border-radius: 4px;
    }
    button {
      padding: 10px 20px;
      background: #00f078;
      border: none;
      color: white;
      border-radius: 4px;
      cursor: pointer;
    }
    #status {
      margin-top: 20px;
      padding: 15px;
      border-radius: 4px;
    }
    .success { background: rgba(0, 240, 120, 0.2); color: #00f078; }
    .error { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
  </style>
</head>
<body>
  <h1>Waitlist Submission Test</h1>
  <p>This is a test page to debug the waitlist functionality.</p>
  
  <form id="testForm">
    <input type="email" id="emailInput" placeholder="Enter email" required />
    <button type="submit">Submit</button>
  </form>
  
  <div id="status"></div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getFirestore, collection, addDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyDvEtdSdsMO-fAJb7aA8z6w2x29lDtHVgc",
      authDomain: "seravault-8c764.firebaseapp.com",
      projectId: "seravault-8c764",
      storageBucket: "seravault-8c764.firebasestorage.app",
      messagingSenderId: "579700244179",
      appId: "1:579700244179:web:e37f48d803d13eb9c81e26"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const form = document.getElementById('testForm');
    const emailInput = document.getElementById('emailInput');
    const status = document.getElementById('status');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = emailInput.value.trim();
      status.textContent = 'Submitting...';
      status.className = '';
      
      try {
        console.log('Attempting to add document to waitlist collection...');
        console.log('Email:', email);
        
        const docRef = await addDoc(collection(db, 'waitlist'), {
          email: email,
          timestamp: serverTimestamp(),
          source: 'test_page',
          interest: 'self_hosting'
        });
        
        console.log('Document written with ID:', docRef.id);
        status.textContent = `✅ Success! Document ID: ${docRef.id}`;
        status.className = 'success';
        emailInput.value = '';
        
      } catch (error) {
        console.error('Error adding document:', error);
        console.error('Error code:', error.code);
        console.error('Error message:', error.message);
        
        status.textContent = `❌ Error: ${error.message}`;
        status.className = 'error';
      }
    });
  </script>
</body>
</html>
